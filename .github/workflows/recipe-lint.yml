name: 🧑‍🍳 Recipe Linter

on:
  push:
    paths:
      - 'dishes/**'
  pull_request:
    paths:
      - 'dishes/**'

jobs:
  lint:
    name: Quality Assurance (Kitchen Inspection)
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout the pantry
        uses: actions/checkout@v4

      - name: 📦 Restore lint cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .lint-cache
          key: lint-${{ hashFiles('dishes/**') }}
          restore-keys: |
            lint-

      - name: 🔍 Inspect recipe directories
        run: |
          echo "🧑‍🍳 Kitchen inspection underway..."
          FAILED=0
          mkdir -p .lint-cache

          for dir in dishes/*/; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")

            # Cache key: hash of all files in this dish directory
            dir_hash=$(find "$dir" -type f | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)
            cache_file=".lint-cache/${dirname}.hash"

            # Skip if hash matches cached result (and previous result was pass)
            if [ -f "$cache_file" ]; then
              cached_hash=$(cat "$cache_file")
              if [ "$cached_hash" = "PASS:${dir_hash}" ]; then
                echo "⏭️  Skipping (unchanged): $dir"
                continue
              fi
            fi

            echo ""
            echo "📁 Inspecting: $dir"
            dish_failed=0

            # Must have recipe.yaml
            if [ ! -f "${dir}recipe.yaml" ]; then
              echo "  ❌ Missing recipe.yaml"
              dish_failed=1
            else
              echo "  ✅ recipe.yaml present"
            fi

            # Must have at least one locale .md file
            MD_COUNT=$(ls "${dir}"*.md 2>/dev/null | wc -l)
            if [ "$MD_COUNT" -eq 0 ]; then
              echo "  ❌ No locale .md files found"
              dish_failed=1
            else
              echo "  ✅ Locale files: $(ls "${dir}"*.md 2>/dev/null | xargs -I{} basename {} | tr '\n' ' ')"
            fi

            # Each .md must have required sections
            for mdfile in "${dir}"*.md; do
              [ -f "$mdfile" ] || continue
              locale=$(basename "$mdfile" .md)
              case "$locale" in
                zh) sections=("## 做法" "## 注意要点" "## 反馈") ;;
                en) sections=("## Method" "## Key Tips" "## Feedback") ;;
                ja) sections=("## 作り方" "## ポイント" "## フィードバック") ;;
                *)  sections=() ;;
              esac
              for section in "${sections[@]}"; do
                if ! grep -q "$section" "$mdfile"; then
                  echo "  ❌ [$locale] Missing section: $section"
                  dish_failed=1
                else
                  echo "  ✅ [$locale] $section"
                fi
              done
            done

            # Directory name convention: YYYY-MM-DD-*
            if ! echo "$dirname" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-.+$'; then
              echo "  ❌ Directory name does not follow YYYY-MM-DD-<name> convention"
              dish_failed=1
            else
              echo "  ✅ Directory name convention: OK"
            fi

            if [ $dish_failed -eq 1 ]; then
              FAILED=1
              # Don't cache failures — re-lint on next push
              rm -f "$cache_file"
            else
              # Cache this passing result
              echo "PASS:${dir_hash}" > "$cache_file"
            fi
          done

          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "💥 Kitchen inspection FAILED. Fix issues before merging."
            exit 1
          else
            TOTAL=$(ls -d dishes/*/ 2>/dev/null | wc -l | tr -d ' ')
            echo "✅ All $TOTAL recipe(s) passed inspection. Kitchen is clean."
          fi

      - name: 📊 Dish count
        run: |
          TOTAL=$(ls -d dishes/*/ 2>/dev/null | wc -l | tr -d ' ')
          echo "📦 Total dishes in codex: $TOTAL"
